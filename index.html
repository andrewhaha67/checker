<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Counter & AI Checker</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f5;
      color: #111827;
      padding: 24px;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      text-align: center;
      font-size: 28px;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
      background: #f3f4f6;
      padding: 6px;
      border-radius: 16px;
    }

    .tab-btn {
      padding: 13px 16px;
      border: none;
      border-radius: 12px;
      background: transparent;
      color: #374151;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .tab-btn.active {
      background: #111827;
      color: #ffffff;
    }

    .add-area {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 13px 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: #111827;
    }

    .add-btn {
      padding: 13px 18px;
      border: none;
      border-radius: 12px;
      background: #111827;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .buttons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }

    .counter-card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 14px;
      text-align: center;
    }

    .count-btn {
      width: 100%;
      padding: 16px 10px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      text-transform: capitalize;
    }

    .count-btn:hover {
      background: #1d4ed8;
    }

    .delete-btn {
      margin-top: 10px;
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 10px;
      background: #ef4444;
      color: white;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }

    .delete-btn:hover {
      background: #dc2626;
    }

    .result-section {
      border-top: 1px solid #e5e7eb;
      padding-top: 20px;
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .result-title {
      font-size: 20px;
      font-weight: 700;
    }

    .copy-btn {
      padding: 9px 14px;
      border: none;
      border-radius: 10px;
      background: #16a34a;
      color: white;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .copy-btn:hover {
      background: #15803d;
    }

    .result-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .result-item {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      column-gap: 16px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 16px;
    }

    .result-name {
      text-transform: capitalize;
      font-weight: 600;
    }

    .result-value {
      font-weight: 800;
      color: #2563eb;
    }

    .empty {
      color: #6b7280;
      text-align: center;
      padding: 20px;
      grid-column: 1 / -1;
    }

    @media (max-width: 520px) {
      body {
        padding: 14px;
      }

      .container {
        padding: 18px;
      }

      .add-area {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="pageTitle">AI Counter</h1>

    <div class="tabs">
      <button id="aiCounterTab" class="tab-btn active" type="button" onclick="switchTab('aiCounter')">AI Counter</button>
      <button id="aiCheckerTab" class="tab-btn" type="button" onclick="switchTab('aiChecker')">AI Checker</button>
    </div>

    <div class="add-area">
      <input id="newNameInput" type="text" placeholder="输入新名字，例如：alex" />
      <button class="add-btn" type="button" onclick="addCounter()">Add Button</button>
    </div>

    <div id="buttonsGrid" class="buttons-grid"></div>

    <div class="result-section">
      <div class="result-header">
        <div id="resultTitle" class="result-title">AI Counter Value</div>
        <button id="copyBtn" class="copy-btn" type="button" onclick="copyCurrentTabText()">Copy</button>
      </div>
      <div id="resultList" class="result-list"></div>
    </div>
  </div>

  <script>
    const aiCounterDefaultNames = [
      'danny',
      'gavin',
      'jack',
      'gc',
      'jun',
      'ken',
      'justin',
      'brayson'
    ];

    const aiCheckerDefaultNames = [
      'danny',
      'gavin',
      'jack',
      'gc',
      'jun',
      'ken',
      'justin',
      'brayson',
      'alan',
      'bryan',
      'hao',
      'maverick',
      'jay'
    ];

    let activeTab = 'aiCounter';

    const tabData = {
      aiCounter: createCounters(aiCounterDefaultNames),
      aiChecker: createCounters(aiCheckerDefaultNames)
    };

    function createCounters(names) {
      return names.map(name => ({
        name: name,
        value: 0
      }));
    }

    function getCurrentCounters() {
      return tabData[activeTab];
    }

    function switchTab(tabName) {
      activeTab = tabName;

      document.getElementById('aiCounterTab').classList.toggle('active', activeTab === 'aiCounter');
      document.getElementById('aiCheckerTab').classList.toggle('active', activeTab === 'aiChecker');

      document.getElementById('pageTitle').textContent = activeTab === 'aiCounter' ? 'AI Counter' : 'AI Checker';
      document.getElementById('resultTitle').textContent = activeTab === 'aiCounter' ? 'AI Counter Value' : 'AI Checker Value';
      document.getElementById('newNameInput').value = '';

      render();
    }

    function render() {
      const counters = getCurrentCounters();
      const buttonsGrid = document.getElementById('buttonsGrid');
      const resultList = document.getElementById('resultList');

      buttonsGrid.innerHTML = '';
      resultList.innerHTML = '';

      if (counters.length === 0) {
        buttonsGrid.innerHTML = '<div class="empty">没有按钮了，请添加新的 button。</div>';
        resultList.innerHTML = '<div class="empty">暂无 value。</div>';
        return;
      }

      counters.forEach((counter, index) => {
        const card = document.createElement('div');
        card.className = 'counter-card';

        const countButton = document.createElement('button');
        countButton.className = 'count-btn';
        countButton.type = 'button';
        countButton.textContent = counter.name;
        countButton.onclick = function () {
          increaseCounter(index);
        };

        const deleteButton = document.createElement('button');
        deleteButton.className = 'delete-btn';
        deleteButton.type = 'button';
        deleteButton.textContent = 'Delete';
        deleteButton.onclick = function () {
          deleteCounter(index);
        };

        card.appendChild(countButton);
        card.appendChild(deleteButton);
        buttonsGrid.appendChild(card);

        const resultItem = document.createElement('div');
        resultItem.className = 'result-item';

        const resultName = document.createElement('span');
        resultName.className = 'result-name';
        resultName.textContent = counter.name;

        const resultValue = document.createElement('span');
        resultValue.className = 'result-value';
        resultValue.textContent = counter.value;

        resultItem.appendChild(resultName);
        resultItem.appendChild(resultValue);
        resultList.appendChild(resultItem);
      });
    }

    function increaseCounter(index) {
      const counters = getCurrentCounters();
      counters[index].value += 1;
      render();
    }

    function deleteCounter(index) {
      const counters = getCurrentCounters();
      counters.splice(index, 1);
      render();
    }

    function addCounter() {
      const counters = getCurrentCounters();
      const input = document.getElementById('newNameInput');
      const name = input.value.trim().toLowerCase();

      if (name === '') {
        alert('请输入名字');
        return;
      }

      const alreadyExists = counters.some(counter => counter.name.toLowerCase() === name);
      if (alreadyExists) {
        alert('这个 button 已经存在');
        return;
      }

      counters.push({
        name: name,
        value: 0
      });

      input.value = '';
      render();
    }

    function copyCurrentTabText() {
      const counters = getCurrentCounters();
      const copyText = counters
        .map(counter => `${counter.name} ${counter.value}`)
        .join('\n');

      if (copyText.trim() === '') {
        alert('暂无内容可以复制');
        return;
      }

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(copyText).then(function () {
          showCopiedStatus();
        }).catch(function () {
          fallbackCopy(copyText);
        });
      } else {
        fallbackCopy(copyText);
      }
    }

    function fallbackCopy(text) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      showCopiedStatus();
    }

    function showCopiedStatus() {
      const copyBtn = document.getElementById('copyBtn');
      const originalText = copyBtn.textContent;
      copyBtn.textContent = 'Copied';

      setTimeout(function () {
        copyBtn.textContent = originalText;
      }, 1200);
    }

    document.getElementById('newNameInput').addEventListener('keydown', function(event) {
      if (event.key === 'Enter') {
        addCounter();
      }
    });

    render();
  </script>
</body>
</html>
